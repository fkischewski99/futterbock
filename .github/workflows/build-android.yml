name: Build Android

on:
  workflow_call:
    inputs:
      asset_url:
        description: "Asset upload URL from the release workflow"
        required: true
        type: string

env:
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
  FIREBASE_APPLICATION_ID: ${{ secrets.FIREBASE_APPLICATION_ID }}
  FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}

jobs:
  build-android:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Write google-services.json from secret
        run: echo '${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}' > composeApp/google-services.json

      - name: Decode Keystore
        id: decode_keystore
        uses: timheuer/base64-to-file@v1
        with:
          fileName: "keystore"
          encodedString: ${{ secrets.ANDROID_KEYSTORE_BASE_64 }}

      - name: Build Android APK
        run: |
          ./gradlew composeApp:assembleRelease \
            -Pandroid.injected.signing.store.file=${{ steps.decode_keystore.outputs.filePath }} \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEYSTORE_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Build Android AAB
        run: |
          ./gradlew composeApp:bundleRelease \
            -Pandroid.injected.signing.store.file=${{ steps.decode_keystore.outputs.filePath }} \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEYSTORE_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Get Version Name
        id: get_version_name
        run: |
          chmod +x ./.github/scripts/get_version_name.sh
          echo "version_name=$(./.github/scripts/get_version_name.sh versions.properties)" >> $GITHUB_OUTPUT

      - name: Upload Release APK Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ inputs.asset_url }}
          asset_path: composeApp/build/outputs/apk/release/composeApp-release.apk
          asset_name: futterbock-${{ github.ref_name }}.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Upload Release AAB Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ inputs.asset_url }}
          asset_path: composeApp/build/outputs/bundle/release/composeApp-release.aab
          asset_name: futterbock-${{ github.ref_name }}.aab
          asset_content_type: application/x-authorware-bin

      - name: Install Codemagic CLI tools
        run: pip install codemagic-cli-tools

      - name: Publish to Google Play Internal Track
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS }}
          GOOGLE_PLAY_PACKAGE_NAME: org.futterbock.app
        run: |
          echo "Publishing Futterbock to Google Play Internal Track"
          google-play bundles publish \
            --bundle "composeApp/build/outputs/bundle/release/composeApp-release.aab" \
            --track internal
